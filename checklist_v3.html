<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제조본부장 지시사항 v4.0</title>
    <!-- React & Babel CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <!-- Google Fonts: Inter & Noto Sans KR -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Noto+Sans+KR:400;700;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --onyx: #1a1a1a;
            --charcoal: #2d2d2d;
            --gold: #d4af37;
            --white: #ffffff;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at top right, #333, #111);
            color: var(--white);
            font-family: 'Noto Sans KR', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 800px;
            position: relative;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            position: relative;
            width: 100%;
            flex-wrap: wrap;
        }

        h1 {
            font-size: 2.22rem;
            font-weight: 900;
            letter-spacing: -1px;
            background: linear-gradient(to right, #fff, var(--gold));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: left;
            line-height: 1.1;
            max-width: 70%;
        }

        .count-box {
            background: transparent;
            border: none;
            padding: 0;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.9rem;
            text-align: right;
            margin-bottom: 10px;
            width: 100%;
            display: block;
        }

        .btn-history-open {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: var(--gold);
            padding: 10px 20px;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
            flex-shrink: 0;
            margin-left: 10px;
            margin-top: 5px;
        }

        .btn-history-open:hover {
            background: var(--gold);
            color: var(--onyx);
        }

        .table-wrapper {
            width: 100%;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            max-height: 550px;
            overflow-y: auto;
            position: relative;
            padding: 10px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            margin-top: 20px;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 8px;
            text-align: center;
        }

        thead {
            position: sticky;
            top: 0;
            z-index: 2;
        }

        th {
            background: var(--charcoal);
            padding: 15px 10px;
            font-weight: 700;
            color: var(--gold);
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        th:first-child {
            border-radius: 12px 0 0 12px;
        }

        th:last-child {
            border-radius: 0 12px 12px 0;
        }

        td {
            padding: 18px 10px;
            background: rgba(255, 255, 255, 0.03);
            border-top: 1px solid var(--glass-border);
            border-bottom: 1px solid var(--glass-border);
            font-size: 1rem;
            transition: all 0.3s;
        }

        td:first-child {
            border-left: 1px solid var(--glass-border);
            border-radius: 16px 0 0 16px;
        }

        td:last-child {
            border-right: 1px solid var(--glass-border);
            border-radius: 0 16px 16px 0;
        }

        tbody tr:hover td {
            background: rgba(255, 255, 255, 0.07);
            transform: scale(1.005);
            border-color: var(--gold);
        }

        .col-date {
            width: 110px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.85rem;
        }

        .col-task {
            text-align: center;
            font-weight: 400;
        }

        .col-manager {
            width: 100px;
            font-weight: 600;
            color: var(--gold);
        }

        .col-target {
            width: 110px;
            opacity: 0.8;
        }

        .col-overdue {
            width: 90px;
        }

        /* Input Row */
        .input-row td {
            background: rgba(212, 175, 55, 0.1);
            border-color: var(--gold);
        }

        .team-select {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 8px;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.95rem;
            cursor: pointer;
            outline: none;
            transition: all 0.3s;
            appearance: none;
            text-align: center;
        }

        .team-select:focus {
            border-color: var(--gold);
            background: rgba(212, 175, 55, 0.1);
        }

        .team-select option {
            background: var(--onyx);
            color: white;
        }

        input {
            width: 100%;
            background: transparent;
            border: none;
            color: white;
            padding: 5px;
            text-align: inherit;
            font-family: inherit;
            font-size: 0.95rem;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        input:focus {
            outline: none;
        }

        .btn-add-cell {
            background: var(--gold) !important;
            color: var(--onyx) !important;
            font-weight: 900 !important;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-add-cell:hover {
            background: #fff !important;
            box-shadow: 0 0 15px var(--gold);
        }

        .btn-complete {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 8px 16px;
            cursor: pointer;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.8rem;
            transition: all 0.3s;
        }

        .btn-complete:hover {
            background: var(--gold);
            color: var(--onyx);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
        }

        .btn-delete {
            background: transparent;
            border: 1px solid #ff4757;
            color: #ff4757;
            padding: 8px 16px;
            cursor: pointer;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.8rem;
            transition: all 0.3s;
            margin-right: 8px;
        }

        .btn-delete:hover {
            background: #ff4757;
            color: white;
            box-shadow: 0 5px 15px rgba(255, 71, 87, 0.3);
        }


        /* History Overlay */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal {
            background: var(--onyx);
            border: 1px solid var(--gold);
            padding: 50px;
            border-radius: 32px;
            width: 95%;
            max-width: 1000px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.8);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 35px;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 20px;
            position: relative;
        }

        .modal-header h2 {
            color: var(--gold);
            font-size: 1.8rem;
        }

        .modal-count {
            margin-left: auto;
            background: transparent;
            border: none;
            padding: 0;
            color: rgba(255, 255, 255, 0.4);
            font-weight: 700;
            font-size: 0.9rem;
        }

        .filter-group {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-bottom: 30px;
            background: var(--glass);
            padding: 15px 25px;
            border-radius: 12px;
        }

        .filter-group input {
            width: 140px;
            border-bottom: 1px solid var(--gold);
            color: var(--gold);
            font-weight: 700;
        }

        .btn-close {
            color: var(--white);
            background: none;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            opacity: 0.5;
            transition: 0.3s;
        }

        .btn-close:hover {
            opacity: 1;
            color: var(--gold);
        }

        .overdue-red {
            color: #ff4757;
            font-weight: 700;
            text-shadow: 0 0 10px rgba(255, 71, 87, 0.3);
        }

        /* Custom Scrollbar */
        .table-wrapper::-webkit-scrollbar-track,
        .modal::-webkit-scrollbar-track {
            background: transparent;
        }

        /* Mobile Responsive Styles - Fully Edge-to-Edge */
        @media screen and (max-width: 768px) {
            body {
                padding: 20px !important;
                background: radial-gradient(circle at top right, #1a1a1a, #0c0c0c) !important;
            }

            .app-container {
                width: 100% !important;
                max-width: 100% !important;
                margin: 0 auto !important;
                padding: 0 !important;
            }

            header {
                flex-direction: column !important;
                align-items: center !important;
                text-align: center !important;
                margin-bottom: 30px !important;
                padding: 0 !important;
            }

            h1 {
                font-size: 1.8rem !important;
                max-width: 100% !important;
                margin: 0 0 20px 0 !important;
                text-align: center !important;
                position: static !important;
            }

            .btn-history-open,
            .btn-admin-login {
                position: static !important;
                transform: none !important;
                width: 48% !important;
                max-width: none !important;
                margin: 0 !important;
                padding: 12px 10px !important;
                display: flex !important;
                align-items: center;
                justify-content: center;
            }

            .header-buttons {
                display: flex;
                width: 100%;
                gap: 4%;
                margin-top: 15px;
            }

            .count-box {
                text-align: right !important;
                margin-bottom: 8px !important;
                padding-right: 0 !important;
                display: block !important;
                width: 100% !important;
            }

            /* Responsive Table to Cards */
            .table-wrapper {
                background: transparent;
                border: none;
                box-shadow: none;
                padding: 0 !important;
                margin: 0 !important;
                width: 100% !important;
                max-height: none;
                overflow: visible !important;
            }

            table,
            thead,
            tbody,
            th,
            td,
            tr {
                display: block;
            }

            thead tr {
                position: absolute;
                top: -9999px;
                left: -9999px;
            }

            tr {
                background: var(--charcoal);
                backdrop-filter: blur(20px);
                border: 1px solid var(--glass-border) !important;
                border-radius: 16px !important;
                margin-bottom: 15px;
                padding: 20px;
                position: relative;
                width: 100% !important;
            }

            td {
                border: none !important;
                padding: 8px 0 !important;
                text-align: left !important;
                background: transparent !important;
                display: flex;
                justify-content: space-between;
                align-items: center;
                font-size: 1rem;
                white-space: nowrap;
                /* Prevent date wrapping */
            }

            td.col-task {
                display: block !important;
                font-size: 1rem !important;
                /* Reduced to match manager name */
                font-weight: 700;
                margin-bottom: 12px;
                border-bottom: 1px solid var(--glass-border) !important;
                padding-bottom: 12px !important;
            }

            td::before {
                content: attr(data-label);
                font-size: 0.85rem;
                color: rgba(255, 255, 255, 0.4);
                font-weight: 400;
                white-space: nowrap;
                /* Prevent character stacking */
                flex-shrink: 0;
                /* Don't let the label squash */
                margin-right: 15px;
            }

            td.col-task::before {
                display: block;
                margin-bottom: 6px;
                font-size: 0.8rem;
            }

            td:last-child {
                display: flex !important;
                margin-top: 15px;
                border-top: 1px solid var(--glass-border) !important;
                padding-top: 15px !important;
                justify-content: flex-end;
                gap: 10px;
            }

            .btn-complete,
            .btn-delete {
                flex: 1;
                padding: 14px;
                font-size: 0.9rem;
            }

            .btn-delete {
                margin: 0 !important;
                background: rgba(255, 71, 87, 0.1);
                border: 1px solid #ff4757;
                color: #ff4757;
                border-radius: 12px;
                font-weight: 700;
            }

            .btn-complete {
                border-radius: 12px;
            }

            tr.input-row {
                background: rgba(212, 175, 55, 0.1);
                border-color: var(--gold);
            }

            .btn-add-cell {
                justify-content: center !important;
                border-radius: 12px !important;
                margin-top: 10px !important;
                height: 50px;
            }

            /* Fix Team Dropdown & Input Overlap */
            .col-manager,
            .col-target {
                justify-content: space-between !important;
            }

            .team-select,
            tr.input-row input {
                width: auto !important;
                min-width: 150px;
                flex-grow: 1;
                max-width: 200px;
                margin-left: auto;
                text-align: right !important;
            }

            .team-select {
                padding-right: 25px !important;
                /* For the arrow space */
            }

            .col-actions::before {
                display: none !important;
                /* Remove '진행' label as requested */
            }

            .col-actions {
                display: flex !important;
                justify-content: flex-end !important;
                gap: 8px;
            }

            .btn-edit,
            .btn-delete,
            .btn-complete {
                flex: 1;
                max-width: 80px;
                height: 40px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 0.85rem;
                border-radius: 8px;
            }
        }

        .btn-edit {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 8px 15px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-edit:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--gold);
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            // Load initial states from localStorage
            const [tasks, setTasks] = useState(() => {
                const saved = localStorage.getItem('executive_tasks');
                return saved ? JSON.parse(saved) : [];
            });

            const [completedTasks, setCompletedTasks] = useState(() => {
                const saved = localStorage.getItem('executive_completed_tasks');
                return saved ? JSON.parse(saved) : [];
            });

            const [editingId, setEditingId] = useState(null);

            // One-time cleanup of specific sample data (IDs: 1, 2, 101)
            useEffect(() => {
                const cleanupDone = localStorage.getItem('cleanup_v3.0_done');
                if (!cleanupDone) {
                    setTasks(prev => prev.filter(t => t.id !== 1 && t.id !== 2));
                    setCompletedTasks(prev => prev.filter(t => t.id !== 101));
                    localStorage.setItem('cleanup_v3.0_done', 'true');
                }
            }, []);

            // Persist to localStorage whenever states change
            useEffect(() => {
                localStorage.setItem('executive_tasks', JSON.stringify(tasks));
            }, [tasks]);

            useEffect(() => {
                localStorage.setItem('executive_completed_tasks', JSON.stringify(completedTasks));
            }, [completedTasks]);


            const [showHistory, setShowHistory] = useState(false);
            const [startDate, setStartDate] = useState(() => {
                const d = new Date();
                d.setMonth(d.getMonth() - 6);
                return d.toISOString().slice(2, 10);
            });
            const [endDate, setEndDate] = useState(() => new Date().toISOString().slice(2, 10));

            // Admin Logic
            const [user, setUser] = useState(null);
            const isAdmin = user?.email === 'gipum704@gmail.com' ||
                new URLSearchParams(window.location.search).get('debug') === 'admin' ||
                localStorage.getItem('executive_admin') === 'true';

            const showAdminButton = new URLSearchParams(window.location.search).get('admin') === '1';

            const handleLogin = (response) => {
                const payload = JSON.parse(atob(response.credential.split('.')[1]));
                setUser(payload);
                if (payload.email === 'gipum704@gmail.com') {
                    localStorage.setItem('executive_admin', 'true');
                }
                console.log("Logged in as:", payload.email);
            };

            useEffect(() => {
                const initGSI = () => {
                    if (window.google) {
                        google.accounts.id.initialize({
                            client_id: '108149202052-ndm688863f6r0dcp47p2f4q33306r8f5.apps.googleusercontent.com',
                            callback: handleLogin
                        });
                    } else {
                        setTimeout(initGSI, 500);
                    }
                };
                initGSI();
            }, []);

            const triggerLogin = () => {
                if (window.google) {
                    google.accounts.id.initialize({
                        client_id: '108149202052-ndm688863f6r0dcp47p2f4q33306r8f5.apps.googleusercontent.com',
                        callback: handleLogin
                    });
                    google.accounts.id.prompt((notification) => {
                        if (notification.isNotDisplayed() || notification.isSkippedMoment()) {
                            const pwd = prompt("구글 로그인 차단됨. 비상 패스워드 입력:");
                            if (pwd === 'gipum704') {
                                localStorage.setItem('executive_admin', 'true');
                                window.location.reload();
                            }
                        }
                    });
                } else {
                    const pwd = prompt("비상 패스워드 입력:");
                    if (pwd === 'gipum704') {
                        localStorage.setItem('executive_admin', 'true');
                        window.location.reload();
                    }
                }
            };


            const [newInput, setNewInput] = useState({
                content: '',
                manager: '',
                target: ''
            });

            const formatDateInput = (value) => {
                const digits = value.replace(/\D/g, '');
                if (digits.length <= 2) return digits;
                if (digits.length <= 4) return `${digits.slice(0, 2)}-${digits.slice(2)}`;
                return `${digits.slice(0, 2)}-${digits.slice(2, 4)}-${digits.slice(4, 6)}`;
            };

            const addTask = () => {
                if (editingId) {
                    setTasks(tasks.map(t => t.id === editingId ? { ...t, content: newInput.content, manager: newInput.manager, target: newInput.target } : t));
                    setEditingId(null);
                } else {
                    const today = new Date();
                    const dateStr = today.toISOString().slice(2, 10).replace(/-/g, '-');

                    const newTask = {
                        id: Date.now(),
                        date: dateStr,
                        content: newInput.content || '새로운 지시사항',
                        manager: newInput.manager || '담당자',
                        target: newInput.target || dateStr,
                        overdue: 0
                    };
                    setTasks([...tasks, newTask]);
                }
                setNewInput({ content: '', manager: '', target: '' });
            };

            const editTask = (id) => {
                const task = tasks.find(t => t.id === id);
                setNewInput({ content: task.content, manager: task.manager, target: task.target });
                setEditingId(id);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const completeTask = (id) => {
                const taskToComplete = tasks.find(t => t.id === id);
                const today = new Date().toISOString().slice(2, 10).replace(/-/g, '-');
                setCompletedTasks([...completedTasks, { ...taskToComplete, completedDate: today }]);
                setTasks(tasks.filter(t => t.id !== id));
            };

            const deleteTask = (id) => {
                if (confirm('정말 삭제하시겠습니까?')) {
                    setTasks(tasks.filter(t => t.id !== id));
                }
            };


            const filteredHistory = completedTasks.filter(task => {
                return task.completedDate >= startDate && task.completedDate <= endDate;
            });

            const padCount = (num) => num.toString().padStart(2, '0');

            return (
                <div className="app-container">
                    <header>
                        <h1>제조본부장 지시사항 <span style={{ fontSize: '0.8rem', opacity: 0.3 }}>v4.2</span></h1>
                        <div className="header-buttons" style={{ display: 'flex', gap: '10px', marginTop: '15px' }}>
                            <button className="btn-history-open" onClick={() => setShowHistory(true)} style={{ position: 'static', transform: 'none', background: 'rgba(255,255,255,0.05)', border: '1px solid var(--glass-border)', color: 'var(--gold)', padding: '10px 20px', borderRadius: '8px' }}>완료 조회</button>
                            {showAdminButton && !isAdmin && (
                                <button className="btn-admin-login" onClick={triggerLogin} style={{ background: 'none', border: '1px solid white', color: 'white', padding: '10px 20px', borderRadius: '8px', cursor: 'pointer' }}>관리자 로그인</button>
                            )}
                            {isAdmin && (
                                <div style={{ border: '1px solid var(--gold)', color: 'var(--gold)', padding: '10px 20px', borderRadius: '8px', fontSize: '0.9rem' }}>관리자 인증됨</div>
                            )}
                        </div>
                    </header>

                    <div className="count-box">{padCount(tasks.length)} 건</div>


                    <div className="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th className="col-date">지시일</th>
                                    <th className="col-task">지시 사항</th>
                                    <th className="col-manager">담당</th>
                                    <th className="col-target">목표일</th>
                                    <th className="col-overdue">초과일</th>
                                    <th style={{ width: '150px' }}>진행</th>

                                </tr>
                            </thead>
                            <tbody>
                                {isAdmin && (
                                    <tr className="input-row">
                                        <td className="col-date">자동입력</td>
                                        <td className="col-task">
                                            <input
                                                placeholder="지시 사항 입력..."
                                                value={newInput.content}
                                                onChange={e => setNewInput({ ...newInput, content: e.target.value })}
                                            />
                                        </td>
                                        <td className="col-manager" data-label="담당">
                                            <select
                                                className="team-select"
                                                value={newInput.manager}
                                                onChange={e => setNewInput({ ...newInput, manager: e.target.value })}
                                            >
                                                <option value="">담당 선택</option>
                                                <option value="생산기술팀">생산기술팀</option>
                                                <option value="제조기획팀">제조기획팀</option>
                                                <option value="IT운영팀">IT운영팀</option>
                                                <option value="디지털혁신팀">디지털혁신팀</option>
                                            </select>
                                        </td>
                                        <td className="col-target" data-label="목표일">
                                            <input
                                                placeholder="26-00-00"
                                                value={newInput.target}
                                                onChange={e => setNewInput({ ...newInput, target: formatDateInput(e.target.value) })}
                                            />

                                        </td>
                                        <td data-label="초과일">-</td>
                                        <td className="btn-add-cell">
                                            <button
                                                style={{ background: 'none', border: 'none', fontWeight: 900, cursor: 'pointer', width: '100%', color: editingId ? 'var(--gold)' : 'inherit' }}
                                                onClick={addTask}
                                            >
                                                {editingId ? '수정 반영' : '추가'}
                                            </button>
                                        </td>
                                    </tr>
                                )}
                                {tasks.map(task => (
                                    <tr key={task.id}>
                                        <td className="col-date" data-label="지시일">{task.date}</td>
                                        <td className="col-task" data-label="지시사항">{task.content}</td>
                                        <td className="col-manager" data-label="담당">{task.manager}</td>
                                        <td className="col-target" data-label="목표일">{task.target}</td>
                                        <td className={task.overdue > 0 ? 'overdue-red' : ''} data-label="초과일">{task.overdue} 일</td>
                                        <td className="col-actions">
                                            {isAdmin ? (
                                                <React.Fragment>
                                                    <button className="btn-edit" style={{ background: 'none', border: '1px solid var(--glass-border)', color: 'white' }} onClick={() => editTask(task.id)}>수정</button>
                                                    <button className="btn-delete" onClick={() => deleteTask(task.id)}>삭제</button>
                                                    <button className="btn-complete" onClick={() => completeTask(task.id)}>완료</button>
                                                </React.Fragment>
                                            ) : (
                                                <div style={{ color: '#999', fontSize: '0.8rem', fontStyle: 'italic' }}>조회 전용</div>
                                            )}
                                        </td>
                                    </tr>
                                ))}


                            </tbody>
                        </table>
                    </div>

                    {showHistory && (
                        <div className="overlay">
                            <div className="modal">
                                <div className="modal-header">
                                    <h2>완료된 지시사항 이력</h2>
                                    <button className="btn-close" onClick={() => setShowHistory(false)}>&times;</button>
                                </div>

                                <div className="filter-group" style={{ display: 'flex', alignItems: 'center', flexWrap: 'wrap', gap: '10px' }}>
                                    <span style={{ whiteSpace: 'nowrap' }}>기간 조회: </span>
                                    <div style={{ display: 'flex', alignItems: 'center', gap: '5px', flexGrow: 1 }}>
                                        <input type="text" value={startDate} onChange={e => setStartDate(formatDateInput(e.target.value))} placeholder="26-00-00" style={{ flex: 1, minWidth: '80px' }} />
                                        <span>~</span>
                                        <input type="text" value={endDate} onChange={e => setEndDate(formatDateInput(e.target.value))} placeholder="26-00-00" style={{ flex: 1, minWidth: '80px' }} />
                                    </div>
                                    <div className="modal-count" style={{ marginLeft: 'auto' }}>{padCount(filteredHistory.length)} 건</div>
                                </div>

                                <table>
                                    <thead>
                                        <tr>
                                            <th>지시일</th>
                                            <th>지시 사항</th>
                                            <th>담당</th>
                                            <th>목표일</th>
                                            <th>완료일</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {filteredHistory.map(task => (
                                            <tr key={task.id}>
                                                <td data-label="지시일">{task.date}</td>
                                                <td className="col-task" data-label="지시사항" style={{ textAlign: 'center' }}>{task.content}</td>
                                                <td style={{ color: 'var(--gold)' }} data-label="담당">{task.manager}</td>
                                                <td data-label="목표일">{task.target}</td>
                                                <td style={{ color: '#2b8a3e', fontWeight: 700 }} data-label="완료일">{task.completedDate}</td>
                                            </tr>
                                        ))}
                                        {filteredHistory.length === 0 && (
                                            <tr>
                                                <td colSpan="5" style={{ padding: '40px', color: '#999' }}>해당 기간의 완료 이력이 없습니다.</td>
                                            </tr>
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
