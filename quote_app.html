<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quote Generator - Hyundai Card Style</title>
    <!-- React & Babel CDN -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --accent-color: #000000;
            --font-main: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            margin: 0;
        }

        #root {
            width: 100%;
            max-width: 800px;
            padding: 40px;
            text-align: center;
        }

        .container {
            border: 4px solid var(--accent-color);
            padding: 100px 40px 60px 40px;
            /* Increased top padding for headers */
            position: relative;
            background: white;
            box-shadow: 20px 20px 0px var(--accent-color);
            transition: opacity 0.3s ease;
        }

        .quote-box {
            margin-bottom: 40px;
        }

        .quote-text {
            font-size: 2rem;
            font-weight: 900;
            line-height: 1.3;
            word-break: keep-all;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: -1px;
        }

        @media (max-width: 600px) {
            #root {
                padding: 20px;
            }

            .container {
                padding: 90px 25px 40px 25px;
                /* Increased top padding for mobile */
            }

            .quote-text {
                font-size: 1.4rem;
                line-height: 1.4;
            }

            .quote-ko {
                font-size: 0.95rem;
            }
        }

        .quote-author {
            font-size: 1.1rem;
            font-weight: 400;
            opacity: 0.6;
            margin-bottom: 10px;
        }

        .new-quote-btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 18px 36px;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s ease;
            position: absolute;
            bottom: -28px;
            left: 50%;
            transform: translateX(-50%);
            outline: none;
        }

        .new-quote-btn:hover {
            transform: translateX(-50%) translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .new-quote-btn:active {
            transform: translateX(-50%) translateY(0);
        }

        .card-id {
            position: absolute;
            top: 30px;
            left: 30px;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 2px;
            opacity: 0.8;
        }

        .card-logo {
            position: absolute;
            top: 30px;
            right: 30px;
            font-weight: 900;
            letter-spacing: -1px;
            font-size: 1.1rem;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const quotes = [
            {
                text: "The only way to do great work is to love what you do.",
                ko: "위대한 일을 하는 유일한 방법은 당신이 하는 일을 사랑하는 것입니다.",
                author: "Steve Jobs"
            },
            {
                text: "Life is what happens when you're busy making other plans.",
                ko: "인생이란 당신이 다른 계획을 세우느라 바쁠 때 일어나는 것입니다.",
                author: "John Lennon"
            },
            {
                text: "The way to get started is to quit talking and begin doing.",
                ko: "시작하는 방법은 말하기를 그만두고 행동을 시작하는 것입니다.",
                author: "Walt Disney"
            },
            {
                text: "If life were predictable it would cease to be life, and be without flavor.",
                ko: "인생이 예측 가능하다면 그것은 더 이상 인생이 아닐 것이며, 맛도 없을 것입니다.",
                author: "Eleanor Roosevelt"
            },
            {
                text: "If you look at what you have in life, you'll always have more.",
                ko: "인생에서 당신이 가진 것을 바라본다면, 당신은 항상 더 많은 것을 갖게 될 것입니다.",
                author: "Oprah Winfrey"
            },
            {
                text: "The greatest glory in living lies not in never falling, but in rising every time we fall.",
                ko: "인생에서 가장 큰 영광은 결코 넘어지지 않는 데 있는 것이 아니라, 넘어질 때마다 다시 일어나는 데 있습니다.",
                author: "Nelson Mandela"
            },
            {
                text: "The only impossible journey is the one you never begin.",
                ko: "유일하게 불가능한 여행은 당신이 결코 시작하지 않은 여행입니다.",
                author: "Tony Robbins"
            },
            {
                text: "Only a life lived for others is a life worthwhile.",
                ko: "타인을 위해 사는 인생만이 가치 있는 인생입니다.",
                author: "Albert Einstein"
            },
            {
                text: "You only live once, but if you do it right, once is enough.",
                ko: "당신은 한 번밖에 살지 않지만, 제대로 산다면 한 번으로도 충분합니다.",
                author: "Mae West"
            },
            {
                text: "Success is not final; failure is not fatal: it is the courage to continue that counts.",
                ko: "성공은 최종적인 것이 아니며, 실패는 치명적인 것이 아닙니다. 중요한 것은 계속할 수 있는 용기입니다.",
                author: "Winston S. Churchill"
            }
        ];

        const App = () => {
            const getKoreanDate = () => {
                const now = new Date();
                const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
                const kstOffset = 9 * 60 * 60000;
                const kstDate = new Date(utc + kstOffset);

                const yyyy = kstDate.getFullYear();
                const mm = String(kstDate.getMonth() + 1).padStart(2, '0');
                const dd = String(kstDate.getDate()).padStart(2, '0');
                return `${yyyy}.${mm}.${dd}`;
            };

            const [quote, setQuote] = useState(quotes[Math.floor(Math.random() * quotes.length)]);
            const [fade, setFade] = useState(true);
            const [today, setToday] = useState(getKoreanDate());

            const getRandomQuote = () => {
                setFade(false);
                setTimeout(() => {
                    const randomIndex = Math.floor(Math.random() * quotes.length);
                    setQuote(quotes[randomIndex]);
                    setToday(getKoreanDate());
                    setFade(true);
                }, 300);
            };

            return (
                <div className="container" style={{ opacity: fade ? 1 : 0 }}>
                    <div className="card-id">{today}</div>
                    <div className="card-logo">오늘의 명언</div>

                    <div className="quote-box">
                        <div className="quote-text">"{quote.text}"</div>
                        <div className="quote-ko">{quote.ko}</div>
                        <div className="quote-author">— {quote.author}</div>
                    </div>

                    <button className="new-quote-btn" onClick={getRandomQuote}>
                        새 명언 보기
                    </button>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
