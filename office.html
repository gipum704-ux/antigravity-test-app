<head>

    <!-- Home Screen Icon (Web Clip / PWA) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%23121212%22/><path d=%22M30 30h40v10H40v10h30v10H40v10h40v10H30z%22 fill=%22%23d4af37%22/></svg>">

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --onyx: #121212;
            --charcoal: #1a1a1a;
            --gold: #d4af37;
            --gold-light: #f1e5ac;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--onyx);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 600;
            margin-bottom: 2.5rem;
            letter-spacing: 2px;
            background: linear-gradient(to right, var(--gold-light), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .apps-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
            width: 100%;
            padding: 0 10px;
        }

        @media (max-width: 600px) {
            .apps-grid {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 2rem;
            }
        }

        .app-card {
            background: var(--charcoal);
            border: 1px solid rgba(212, 175, 55, 0.15);
            padding: 2.5rem 1.5rem;
            border-radius: 12px;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .app-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.1), transparent);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .app-card:hover {
            transform: translateY(-8px);
            border-color: var(--gold);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .app-card:hover::before {
            opacity: 1;
        }

        .app-icon {
            font-size: 3rem;
            margin-bottom: 1.5rem;
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.3));
        }

        .app-card h2 {
            font-size: 1.2rem;
            font-weight: 500;
            margin-bottom: 0;
            color: var(--text-main);
        }

        .footer {
            margin-top: 4rem;
            font-size: 0.7rem;
            letter-spacing: 3px;
            color: var(--text-muted);
            text-transform: uppercase;
            opacity: 0.5;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>제조본부 공유방</h1>

        <div class="apps-grid">
            <a href="checklist.html" class="app-card">
                <div class="app-icon">📋</div>
                <h2>제조본부장 지시사항</h2>
            </a>
            <a href="quote_app.html" class="app-card">
                <div class="app-icon">✨</div>
                <h2>명언 제조기</h2>
            </a>
        </div>

        <div class="footer">Premium Executive Suite</div>
    </div>
</body>

</html>
