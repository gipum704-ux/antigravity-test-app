    <style>
        :root {
            --onyx: #0c0c0c;
            --charcoal: #1a1a1a;
            --gold: #d4af37;
            --gold-light: #ffebaa;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--onyx);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 600;
            margin-bottom: 2.5rem;
            letter-spacing: 2px;
            background: linear-gradient(to right, var(--gold-light), var(--gold));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .apps-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
            width: 100%;
            padding: 0 10px;
        }

        @media (max-width: 600px) {
            .apps-grid {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 2rem;
            }
        }

        .app-card {
            background: var(--charcoal);
            border: 1px solid rgba(212, 175, 55, 0.2);
            padding: 2.5rem 1.5rem;
            border-radius: 12px;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .app-card:hover {
            transform: translateY(-8px);
            border-color: var(--gold);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
        }

        .app-icon {
            font-size: 3rem;
            margin-bottom: 1.5rem;
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.4));
        }

        .app-card h2 {
            font-size: 1.25rem;
            font-weight: 500;
            color: var(--text-main);
        }

        .footer {
            margin-top: 4rem;
            font-size: 0.75rem;
            letter-spacing: 3px;
            color: var(--text-muted);
            text-transform: uppercase;
            opacity: 0.6;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>제조본부 공유방</h1>
        <div class="apps-grid">
            <a href="checklist_fixed.html?v=20260303_v5" class="app-card">
                <div class="app-icon">📋</div>
                <h2>제조본부장 지시사항</h2>
            </a>
            <a href="quote_app.html" class="app-card">
                <div class="app-icon">✨</div>
                <h2>명언 제조기</h2>
            </a>
        </div>
        <div class="footer">Excellence in Production & Quality</div>
    </div>
</body>

</html>
